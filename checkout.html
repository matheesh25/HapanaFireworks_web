<script>
/* ===========================
   FIREWORKS — identical to Index.php
=========================== */
const canvas = document.getElementById("fireworksCanvas");
const ctx    = canvas.getContext("2d");
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);
const fireworks = [], particles = [];
class Firework {
  constructor(){ this.x=Math.random()*canvas.width; this.y=canvas.height; this.targetY=Math.random()*canvas.height*0.5; this.color=`hsl(${Math.random()*360},100%,60%)`; this.speed=5; this.exploded=false; }
  update(){ if(!this.exploded){ this.y-=this.speed; if(this.y<=this.targetY){ this.exploded=true; for(let i=0;i<50;i++) particles.push(new Particle(this.x,this.y,this.color)); } } }
  draw(){ if(!this.exploded){ ctx.fillStyle=this.color; ctx.fillRect(this.x,this.y,3,8); } }
}
class Particle {
  constructor(x,y,color){ this.x=x; this.y=y; this.color=color; this.radius=2; this.speedX=(Math.random()-0.5)*6; this.speedY=(Math.random()-0.5)*6; this.gravity=0.05; this.alpha=1; }
  update(){ this.x+=this.speedX; this.y+=this.speedY; this.speedY+=this.gravity; this.alpha-=0.01; }
  draw(){ ctx.globalAlpha=this.alpha; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}
function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if(Math.random()<0.04) fireworks.push(new Firework());
  for(let i=fireworks.length-1;i>=0;i--){ fireworks[i].update(); fireworks[i].draw(); if(fireworks[i].exploded) fireworks.splice(i,1); }
  for(let i=particles.length-1;i>=0;i--){ particles[i].update(); particles[i].draw(); if(particles[i].alpha<=0) particles.splice(i,1); }
  requestAnimationFrame(animate);
}
animate();

/* ===========================
   TOAST
=========================== */
function toast(msg, type="error"){
  const wrap = document.getElementById("toastWrap");
  const t = document.createElement("div");
  t.className = `toast-msg ${type}`;
  t.innerHTML = `<i class="bi bi-${type==="success"?"check-circle-fill":"exclamation-circle-fill"}"></i><span>${msg}</span>`;
  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transform="translateY(12px)"; t.style.transition="0.4s"; setTimeout(()=>t.remove(), 400); }, 3000);
}

/* ===========================
   PAYMENT TOGGLE
=========================== */
function onPaymentChange(radio){
  document.getElementById("cardDetails").style.display = radio.value === "paid" ? "block" : "none";
  document.querySelectorAll(".payment-option").forEach(el => el.classList.remove("selected"));
  radio.closest(".payment-option").classList.add("selected");
}

/* ===========================
   CARD NUMBER FORMATTING
=========================== */
document.getElementById("cardNumber").addEventListener("input", function(){
  let v = this.value.replace(/\D/g,"").substring(0,16);
  this.value = v.match(/.{1,4}/g)?.join(" ") || v;
});

/* ===========================
   EXPIRY FORMATTING
=========================== */
document.getElementById("expiry").addEventListener("input", function(){
  let v = this.value.replace(/\D/g,"");
  if(v.length >= 3) v = v.substring(0,2) + "/" + v.substring(2,4);
  this.value = v;
});

/* ===========================
   LOAD ORDER SUMMARY
=========================== */
let cartTotal = 0;
const DELIVERY = 300;

function loadSummary(){
  const single = JSON.parse(localStorage.getItem("checkoutItem") || "null");
  const all    = JSON.parse(localStorage.getItem("checkoutAll")  || "null");
  const list   = document.getElementById("itemsList");
  const totals = document.getElementById("summaryTotals");
  const divider= document.getElementById("summaryDivider");
  let html = "";
  cartTotal = 0;

  if(single){
    const t = single.price * single.quantity;
    cartTotal = t;
    html += `<div class="summary-item">
      <span class="item-name">${single.name} <span style="color:#888;font-size:0.8rem;">×${single.quantity}</span></span>
      <span class="item-price">LKR ${t.toLocaleString()}</span>
    </div>`;
  } else if(all && all.length){
    all.forEach(item => {
      const t = item.price * item.quantity;
      cartTotal += t;
      html += `<div class="summary-item">
        <span class="item-name">${item.name} <span style="color:#888;font-size:0.8rem;">×${item.quantity}</span></span>
        <span class="item-price">LKR ${t.toLocaleString()}</span>
      </div>`;
    });
  } else {
    html = `<div class="empty-summary"><i class="bi bi-bag-x"></i>No items found.</div>`;
  }

  list.innerHTML = html;

  if(cartTotal > 0){
    divider.style.display = "block";
    totals.innerHTML = `
      <div class="summary-row">
        <span class="row-label">Subtotal</span>
        <span class="row-val">LKR ${cartTotal.toLocaleString()}</span>
      </div>
      <div class="summary-row">
        <span class="row-label">Delivery</span>
        <span class="row-val">LKR ${DELIVERY.toLocaleString()}</span>
      </div>
      <div class="summary-total">
        <span class="total-label">Total</span>
        <span class="total-val">LKR ${(cartTotal + DELIVERY).toLocaleString()}</span>
      </div>`;
  }
}
loadSummary();

/* ===========================
   FORM SUBMIT
=========================== */
document.getElementById("checkoutForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name    = document.getElementById("name").value.trim();
  const phone   = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const payment = document.querySelector('input[name="payment"]:checked').value;

  if(!name)                            { toast("Please enter your full name.");         return; }
  if(!/^[0-9]{10}$/.test(phone))       { toast("Enter a valid 10-digit phone number."); return; }
  if(!address)                         { toast("Please enter your delivery address.");  return; }

  let cardNumber = "";
  if(payment === "paid"){
    const cardName = document.getElementById("cardName").value.trim();
    cardNumber     = document.getElementById("cardNumber").value.replace(/\s/g,"");
    const expiry   = document.getElementById("expiry").value.trim();
    const cvv      = document.getElementById("cvv").value.trim();
    if(!cardName)                              { toast("Enter cardholder name.");              return; }
    if(!/^[0-9]{16}$/.test(cardNumber))        { toast("Card number must be 16 digits.");      return; }
    if(!/^(0[1-9]|1[0-2])\/\d{2}$/.test(expiry)){ toast("Expiry must be MM/YY format.");       return; }
    if(!/^[0-9]{3}$/.test(cvv))               { toast("CVV must be 3 digits.");               return; }
  }

  // Build product/qty from localStorage
  const single  = JSON.parse(localStorage.getItem("checkoutItem") || "null");
  const all     = JSON.parse(localStorage.getItem("checkoutAll")  || "null");
  let product = "", qty = 1;
  if(single){ product = single.name; qty = single.quantity; }
  else if(all && all.length){ product = all.map(i=>i.name).join(", "); qty = all.reduce((s,i)=>s+i.quantity,0); }

  const finalTotal = cartTotal + DELIVERY;

  const formData = new FormData();
  formData.append("name",        name);
  formData.append("phone",       phone);
  formData.append("address",     address);
  formData.append("product",     product);
  formData.append("quantity",    qty);
  formData.append("total",       finalTotal);
  formData.append("payment",     payment);
  formData.append("card_number", cardNumber);

  // Disable button
  const btn = document.querySelector(".place-btn");
  btn.disabled = true;
  btn.innerHTML = `<i class="bi bi-hourglass-split"></i> Placing Order…`;

  fetch("place_order.php", { method:"POST", body: formData })
    .then(res => res.text())
    .then(data => {
      if(data === "success"){
        toast("Order placed successfully! 🎆", "success");
        localStorage.removeItem("checkoutItem");
        localStorage.removeItem("checkoutAll");
        setTimeout(()=>{ window.location.href = "myOrders.php"; }, 1600);
      } else if(data === "login_required"){
        toast("Please login first to place an order.");
        setTimeout(()=>{ window.location.href = "login.html"; }, 1600);
      } else {
        toast("Something went wrong. Please try again.");
        btn.disabled = false;
        btn.innerHTML = `<i class="bi bi-bag-check-fill"></i> Place Order`;
      }
    })
    .catch(()=>{
      toast("Network error. Please check your connection.");
      btn.disabled = false;
      btn.innerHTML = `<i class="bi bi-bag-check-fill"></i> Place Order`;
    });
});
</script>
</body>
</html>
